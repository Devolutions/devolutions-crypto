<!-- Mobile header -->
<header class="mobile-header">
  <button (click)="w3Open()">&#9776;</button>
  <span>Devolutions Crypto</span>
</header>

<!-- Mobile overlay -->
<div id="myOverlay" (click)="w3Close()" style="display:none; position:fixed; inset:0; z-index:40; background:rgba(0,0,0,0.55); cursor:pointer;"></div>

<div class="page-inner">

  <div class="page-heading">
    <fa-icon size="3x" [icon]="faKey"></fa-icon>
    <h1>Password Hashing</h1>
  </div>

  <div class="card">
    <div class="card-title">Hashing</div>
    <div class="card-body">
      <form [formGroup]="passwordForm" (ngSubmit)="hash()">
        <div class="field">
          <label>Password</label>
          <input type="text" formControlName="password" required placeholder="Enter password to hash">
        </div>
        <div class="field">
          <label>Iterations</label>
          <input type="text" formControlName="iteration" placeholder="E.g. 10000">
        </div>
        <div class="field">
          <button type="submit" class="btn btn-primary">Hash</button>
        </div>
        <div class="field">
          <span class="result-label">Result</span>
          <textarea rows="5" formControlName="hashResult" placeholder="Hash output will appear here"></textarea>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Verify</div>
    <div class="card-body">
      <form [formGroup]="verifyForm" (ngSubmit)="verify()">
        <div class="field">
          <label>Password</label>
          <input type="text" formControlName="passwordV" required placeholder="Enter password">
        </div>
        <div class="field">
          <label>Hash</label>
          <input type="text" formControlName="hashV" required placeholder="Paste hash to verify">
        </div>
        <div class="field">
          <button type="submit" class="btn btn-primary">Verify</button>
        </div>
        <div class="field">
          <span class="result-label">Result</span>
          <textarea rows="5" formControlName="passwordResult" placeholder="Verification result will appear here"></textarea>
        </div>
      </form>
    </div>
  </div>

</div>
