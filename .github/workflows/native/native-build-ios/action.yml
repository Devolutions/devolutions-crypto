name: Native Build iOS
description: This builds the iOS native libraries
runs:
  using: composite
  steps:
    - name: Download Config
      uses: actions/download-artifact@v4
      with:
        name: config.txt
        path: ./wrappers/csharp

    - name: Install Homebrew
      shell: bash
      run: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_ENV
    
    - name: Verify Homebrew installation
      shell: bash
      run: brew --version
      
    - name: Install mono
      shell: bash
      run: brew install mono

    - name:  Install Rust
      shell: bash
      run: |
        set -e
        curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Setup iOS minimum version
      shell: bash
      run: echo "IPHONEOS_DEPLOYMENT_TARGET=12.1" >> $GITHUB_ENV

    - name: Install rust
      shell: bash
      run: |
        rustup update

        rustup target add x86_64-apple-ios
        rustup target add aarch64-apple-ios

    - name: Unit tests
      working-directory: ./
      shell: bash
      run: |
        source $HOME/.cargo/env
        cargo test

    - name: Building IOS
      working-directory: ./wrappers/csharp
      shell: bash
      run: |
        source $HOME/.cargo/env
        python3 GeneratePackage.py -p ios
        mkdir output
        mv ./ios ./output/ios

    - uses: actions/upload-artifact@v4.3.6
      with:
        name: native-ios
        path: wrappers/csharp/output/**
