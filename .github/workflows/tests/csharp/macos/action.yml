name: Unit Tests macOS Nuget
description: This tests the macOS nugets package.
runs:
  using: composite
  steps:
    - name: Download Config
      uses: actions/download-artifact@v4
      with:
        name: config.txt
        path: ./wrappers/csharp

    - name: Download Nugets Libs
      uses: actions/download-artifact@v4
      with:
        pattern: nugets-*
        merge-multiple: true
        path: ./wrappers/csharp/tests/unit-tests/nugets/Nugets

    - name: Remove nuget.org source
      shell: bash
      run: |
        dotnet nuget remove source nuget.org
        dotnet nuget list source

    - name: Add local nuget source
      shell: bash
      run: |
        dotnet nuget sources add ./wrappers/csharp/tests/unit-tests/nugets/Nugets -n LocalPackages

    - name: Unit tests
      working-directory: ./wrappers/csharp/tests/unit-tests/nugets
      shell: bash
      run: dotnet test ./macos/macos.csproj
