name: Unit Tests iOS Nuget
description: This tests the iOS nuget package.
runs:
  using: composite
  steps:
    - name: Download Config
      uses: actions/download-artifact@v4
      with:
        name: config.txt
        path: ./wrappers/csharp

    - name: Download Native Libs
      uses: actions/download-artifact@v4
      with:
        pattern: nugets-*
        merge-multiple: true
        path: ./wrappers/csharp/tests/unit-tests/nugets/Nugets

    - name: Add local nuget source
      shell: bash
      run: |
        dotnet nuget add source /Users/runner/work/devolutions-crypto/devolutions-crypto/wrappers/csharp/tests/unit-tests/nugets/Nugets -n LocalPackages
        dotnet nuget list source

    - name: Install iOS Workload
      shell: bash
      run: sudo dotnet workload install ios

    - name: Unit tests
      working-directory: ./wrappers/csharp/tests/unit-tests/nugets
      shell: bash
      run: dotnet test ./dotnet-core/dotnet-core.csproj --framework net8.0-ios -p:RuntimeIdentifier=iossimulator-x64 -p:ApplicationId=com.test.test